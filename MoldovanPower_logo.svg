<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background with rounded corners -->
  <rect width="512" height="512" rx="100" fill="#0B0F19"/>

  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0B0F19;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2563EB;stop-opacity:1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>

  <!-- Subtle grid lines for depth -->
  <line x1="0" y1="256" x2="512" y2="256" stroke="#1E2A3A" stroke-width="1"/>
  <line x1="256" y1="0" x2="256" y2="512" stroke="#1E2A3A" stroke-width="1"/>

  <!-- Lightning bolt — centered, bold -->
  <path d="M295 64 L155 272 h98 L215 448 L375 230 h-102 z"
        fill="url(#boltGrad)"
        filter="url(#glow)"/>

  <!-- Thin inner highlight on bolt -->
  <path d="M295 64 L155 272 h98 L215 448 L375 230 h-102 z"
        fill="none"
        stroke="#93C5FD"
        stroke-width="2"
        opacity="0.3"/>
</svg>
